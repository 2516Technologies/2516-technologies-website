<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mark Henning | 2516 Technologies</title>
  <style>
    :root {
      --bg:#1a1d21;
      --bg2:#20252b;
      --panel:#242a31;
      --panel2:#2a3139;
      --line:#3b82f6;
      --text:#f3f4f6;
      --muted:#d1d5db;
      --sub:#9ca3af;
      --btn:#2a3138;
      --btnBorder:#4b5563;
      --orange:#ff6a45;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color:var(--text);
      background: radial-gradient(circle at 15% 8%, rgba(78,162,255,.18), transparent 30%), linear-gradient(180deg,var(--bg),#111418 90%);
      min-height:100vh;
    }
    .wrap{max-width:540px;margin:0 auto;padding:12px 14px 16px}
    .card{
      background: linear-gradient(180deg, rgba(36,42,49,.96), rgba(26,29,33,.98));
      border:1px solid rgba(255,255,255,.08);
      border-radius:28px;
      padding:18px;
      box-shadow:0 30px 80px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
    }
    .card:before{content:"";position:absolute;right:-70px;top:-70px;width:180px;height:180px;border-radius:50%;background:rgba(78,162,255,.11);filter:blur(8px)}
    .header{display:flex;align-items:center;gap:16px;margin-bottom:14px;position:relative;z-index:2}
    .logo{width:280px;max-width:70%;height:auto;display:block}
    .photo{
      margin-left:auto;
      width:104px;height:104px;border-radius:50%;object-fit:cover;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      background:#1f2937;
      flex:0 0 auto;
    }
    h1{font-size:42px;line-height:.98;letter-spacing:-.04em;margin:4px 0 0;text-align:center}
    .title{font-size:17px;font-weight:700;color:#60a5fa;text-align:center;margin-top:6px}
    .tags{font-size:20px;font-weight:700;color:var(--muted);text-align:center;line-height:1.7;margin:10px auto 0;max-width:390px}
    .rule{width:110px;height:2px;background:var(--line);margin:14px auto;border-radius:999px}
    .btns{display:grid;gap:8px}
    .btn{
      display:flex;align-items:center;gap:12px;justify-content:space-between;
      padding:11px 16px;border-radius:16px;background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.14);text-decoration:none;color:var(--text);
      font-weight:700;font-size:17px;
    }
    .btn .left{display:flex;align-items:center;gap:12px}
    .icon{color:#60a5fa;font-size:21px;width:24px;text-align:center}
    .arr{color:#9ca3af;font-size:22px}
    .footer{margin-top:14px;padding-top:14px;border-top:2px solid rgba(78,162,255,.7);display:flex;align-items:center;gap:14px}
    .footer img{width:138px;height:auto;display:block}
    .footcopy{font-size:15px;color:var(--muted);line-height:1.35}
    .url{text-align:center;color:#60a5fa;font-size:14px;margin-top:18px;word-break:break-word}
    @media (max-width:430px){
      .header{align-items:flex-start}
      .logo{max-width:54%}
      .photo{width:88px;height:88px}
      h1{font-size:36px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="header">
        <img class="logo" src="2516_logo_horizontal_dark_web (1).png" alt="2516 Technologies logo" />
        <img class="photo" src="Headshot.png" alt="Mark Henning headshot" />
      </div>
      <h1>Mark Henning</h1>
      <div class="title">Founder, 2516 Technologies</div>
      <div class="tags">Future-Ready Intelligence</div>
      <div class="rule"></div>
      <div class="btns">
        <a class="btn" href="sms:+17167489230"><span class="left"><span class="icon">💬</span><span>Text Me</span></span><span class="arr">›</span></a>
        <a class="btn" href="mailto:mark@2516technologies.com"><span class="left"><span class="icon">✉</span><span>Email Me</span></span><span class="arr">›</span></a>
        <a class="btn" href="https://www.2516technologies.com"><span class="left"><span class="icon">◎</span><span>Visit Website</span></span><span class="arr">›</span></a>
        <a class="btn" href="https://www.linkedin.com/in/henningmark/"><span class="left"><span class="icon">in</span><span>Connect on LinkedIn</span></span><span class="arr">›</span></a>
        <a class="btn" href="https://calendly.com/mark-2516technologies/30min"><span class="left"><span class="icon">▣</span><span>Book Time</span></span><span class="arr">›</span></a>
      </div>
      <div class="footer">
        <img src="Astrato_logo.png" alt="Astrato logo" />
        <div class="footcopy"><strong>Official Astrato Analytics</strong><br />Partner / Reseller</div>
      </div>
    </section>
    <div class="url">www.2516technologies.com/mark</div>
  </main>
</body>
</html>
